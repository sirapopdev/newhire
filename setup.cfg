[flake8]
max-line-length=119
exclude = .git,__pycache__,old,build,dist,.eggs,manage.py,*default.py,*migrations*,*settings*,setup.py,*urls.py, *coverage*, *html, *js, *txt, *node_modules*

[isort]
known_first_party = django
known_local_folder = newhire
reverse_relative = true
combine_as_imports = true
