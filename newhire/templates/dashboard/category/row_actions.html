{% load django_tables2 %}
{% load i18n %}
<div class="btn-toolbar">
    <div class="dropdown">
        <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown"
            aria-haspopup="true" aria-expanded="false">
            {% trans "Actions" %}
        </button>
        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="dropdownMenuButton">
            <a class="dropdown-item" href="{% url 'dashboard_blogs:category-edit' pk=record.id %}">
                {% trans "Edit" %}
            </a>
            <a class="dropdown-item" href="{% url 'blogs:post-category' record.slug %}">
                {% trans "View on site" %}
            </a>
            <a class="dropdown-item" href="{% url 'dashboard_blogs:category-delete' pk=record.id %}">
                {% trans "Delete" %}
            </a>
        </div>
    </div>
</div>
